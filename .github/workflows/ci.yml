name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check ingestion/ snowpark/

      - name: Format check with ruff
        run: ruff format --check ingestion/ snowpark/

      - name: Run tests
        run: python -m pytest ingestion/tests/ -v

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform validate
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

  sql:
    name: SQL syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration filenames
        run: |
          set -e
          for f in snowflake/migrations/*.sql; do
            if [[ ! $(basename "$f") =~ ^V[0-9]+\.[0-9]+\.[0-9]+__[a-z0-9_]+\.sql$ ]]; then
              echo "❌ Bad migration filename: $f"
              echo "Must match V<MAJOR>.<MINOR>.<PATCH>__<snake_case_name>.sql"
              exit 1
            fi
          done
          echo "✅ All migration filenames OK"
