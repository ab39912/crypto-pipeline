name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    outputs:
      raw_bucket: ${{ steps.tf-output.outputs.raw_bucket }}
    env:
      TF_VAR_snowflake_aws_iam_user_arn: ${{ secrets.SNOWFLAKE_AWS_IAM_USER_ARN }}
      TF_VAR_snowflake_external_id: ${{ secrets.SNOWFLAKE_EXTERNAL_ID }}
      TF_VAR_snowpipe_sqs_arn: ${{ secrets.SNOWPIPE_SQS_ARN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Capture outputs
        id: tf-output
        working-directory: infra
        run: |
          echo "raw_bucket=$(terraform output -raw raw_bucket_name)" >> $GITHUB_OUTPUT

  snowflake:
    name: Snowflake migrations
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install schemachange
        run: pip install schemachange

      - name: Write private key to file
        run: |
          mkdir -p .keys
          chmod 700 .keys
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > .keys/snowflake_key.p8
          chmod 600 .keys/snowflake_key.p8

      - name: Get AWS account ID
        id: aws-id
        run: |
          ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ID" >> $GITHUB_OUTPUT

      - name: Run schemachange
        run: |
          schemachange deploy \
            --snowflake-account "${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            --snowflake-user "${{ secrets.SNOWFLAKE_USER }}" \
            --snowflake-role "${{ secrets.SNOWFLAKE_ROLE }}" \
            --snowflake-warehouse "${{ secrets.SNOWFLAKE_WAREHOUSE }}" \
            --snowflake-database CRYPTO_DEV \
            --snowflake-authenticator snowflake_jwt \
            --snowflake-private-key-path .keys/snowflake_key.p8 \
            --root-folder snowflake/migrations \
            --change-history-table CRYPTO_DEV.PUBLIC.SCHEMACHANGE_HISTORY \
            --create-change-history-table \
            --vars '{"AWS_ACCOUNT_ID":"${{ steps.aws-id.outputs.account_id }}","RAW_BUCKET":"${{ secrets.RAW_BUCKET }}"}'

      - name: Cleanup keys
        if: always()
        run: rm -rf .keys
